<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>霧の森と失われた宝珠</title>

<style>
    body {
        font-family: "Yu Gothic", sans-serif;
        background: #222;
        color: #eee;
        padding: 0;
        margin: 0;
        animation: bgPulse 6s ease-in-out infinite;
    }

    /* 背景が淡く光るパルス */
    @keyframes bgPulse {
        0% { background-color: #222; }
        50% { background-color: #2a2a2a; }
        100% { background-color: #222; }
    }

    /* タイトル画面 */
    #titleScreen {
        text-align: center;
        background: url('title.png');
        background-size: cover;
        background-position: center;
        height: 100vh;
        padding-top: 200px;
        color: white;
        text-shadow: 0 0 10px black;
        animation: fadeIn 1.5s ease;
    }
    #startButton {
        font-size: 28px;
        padding: 15px 40px;
        background: rgba(0,0,0,0.6);
        border-radius: 10px;
        cursor: pointer;
        display: inline-block;
        margin-top: 40px;
    }
    #startButton:hover {
        background: rgba(255,255,255,0.3);
    }

    /* ゲーム画面 */
    #game {
        width: 100%;
        max-width: 650px;
        margin: auto;
        background: #333;
        padding: 20px;
        border-radius: 10px;
        display: none;
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    /* 画像ふわっと */
    #sceneImage {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
        display: none;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 1s ease, transform 1s ease;
    }

    /* 選択肢 */
    .choice {
        background: #555;
        padding: 16px;
        margin: 10px 0;
        border-radius: 5px;
        cursor: pointer;
        font-size: 20px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .choice:hover {
        background: #777;
    }

    /* フェードイン */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* スマホ最適化 */
    @media (max-width: 600px) {
        body {
            font-size: 16px;
            line-height: 1.8;
        }
        #titleScreen {
            padding-top: 120px;
        }
        #startButton {
            font-size: 20px;
            padding: 12px 30px;
        }
        #game {
            width: 90%;
            padding: 15px;
        }
        .choice {
            font-size: 18px;
            padding: 14px;
        }
    }
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="titleScreen">
    <h1>霧の森と失われた宝珠</h1>
    <div id="startButton">ゲームスタート</div>
</div>

<!-- ゲーム画面 -->
<div id="game">
    <img id="sceneImage">
    <div id="textArea"></div>
    <div id="choicesArea"></div>
</div>

<script>
// ===============================
// ★ あなたのストーリー完全復元（A/B/C 全ルート）
// ===============================
const scenes = {
    start: {
        text: "あなたは霧の森に足を踏み入れた。王国からの任務は《蒼光の宝珠》の回収だ。\n森の入口には三つの道がある。",
        image: "forest.jpg",
        choices: {
            A: "光るキノコが並ぶ“青い道”へ進む",
            B: "古い石碑が立つ“黒い道”へ進む",
            C: "どこからか歌声が聞こえる“第三の道”へ進む"
        },
        next: { A: "A1", B: "B1", C: "C1" }
    },

    /* ===== Aルート ===== */
    A1: {
        text: "青い光の中、妖精が現れた。「心の強さを示しなさい」",
        image: "fairy.png",
        choices: {
            A1: "正直に目的を話す",
            A2: "妖精についていく"
        },
        next: { A1: "A2", A2: "A3" }
    },

    A2: {
        text: "妖精はあなたの誠実さを認めた。「ならば、森の奥へ進む資格がある」",
        image: "fairy.png",
        choices: {
            A21: "森の奥へ進む",
            A22: "妖精に質問する"
        },
        next: { A21: "A3", A22: "A2Q" }
    },

    A2Q: {
        text: "「宝珠は王国を守るための鍵。だが、使い方を誤れば災いを呼ぶ」",
        image: "fairy.png",
        choices: { A2Q1: "森の奥へ進む" },
        next: { A2Q1: "A3" }
    },

    A3: {
        text: "妖精はあなたを森の奥へ案内した。そこには古代の祭壇があり、青い光が脈動している。",
        image: "fairy_forest.png",
        choices: {
            A31: "祭壇に触れる",
            A32: "周囲を調べる"
        },
        next: { A31: "A4", A32: "A5" }
    },

    A4: {
        text: "祭壇に触れた瞬間、あなたの頭に古代の記憶が流れ込む。宝珠は“封印”のための道具だった。",
        image: "altar.png",
        choices: {
            A41: "記憶を受け入れる",
            A42: "拒絶する"
        },
        next: { A41: "A6", A42: "endBadA" }
    },

    A5: {
        text: "周囲には古代文字が刻まれていた。「宝珠は王国の未来を左右する」",
        image: "altar.png",
        choices: {
            A51: "祭壇に触れる",
            A52: "妖精に相談する"
        },
        next: { A51: "A4", A52: "A2Q" }
    },

    A6: {
        text: "あなたは宝珠の真実を理解した。妖精は微笑む。「あなたなら託せる」\n宝珠が光り、あなたの手に収まった。",
        image: "forest.jpg",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    endBadA: {
        text: "記憶を拒絶した瞬間、森の魔力が暴走した。あなたは霧に飲まれてしまった。\n=== バッドエンドA ===",
        image: "forest.jpg",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    /* ===== Bルート ===== */
    B1: {
        text: "石碑が光り、古代の守護者が姿を現す。「我を倒すか、知恵を示せ」",
        image: "guardian.png",
        choices: {
            B1: "戦う",
            B2: "知恵で挑む"
        },
        next: { B1: "B2", B2: "B3" }
    },

    B2: {
        text: "守護者は剣を構えた。あなたは必死に応戦するが、力では敵わない。",
        image: "guardian.png",
        choices: {
            B21: "逃げる",
            B22: "隙を突く"
        },
        next: { B21: "B4", B22: "B5" }
    },

    B3: {
        text: "石碑の裏には地下へ続く階段があった。あなたは暗い迷宮へ足を踏み入れる。",
        image: "ruins.png",
        choices: {
            B31: "左の通路へ進む",
            B32: "右の通路へ進む"
        },
        next: { B31: "B6", B32: "B7" }
    },

    B4: {
        text: "あなたは必死に逃げたが、守護者は追ってこなかった。「弱き者よ、去るがよい」",
        image: "guardian.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    B5: {
        text: "あなたは守護者の胸の青い核を狙った。見事に命中し、守護者は崩れ落ちた。",
        image: "guardian.png",
        choices: { B51: "宝珠を探す" },
        next: { B51: "endB" }
    },

    B6: {
        text: "左の通路は罠だらけだった。床が沈み、矢が飛んでくる！",
        image: "trap.png",
        choices: {
            B61: "走り抜ける",
            B62: "罠を解除する"
        },
        next: { B61: "endBadB", B62: "B8" }
    },

    B7: {
        text: "右の通路は静かだった。奥には宝珠を祀る部屋があった。",
        image: "ruins.png",
        choices: { B71: "宝珠を取る" },
        next: { B71: "endC" }
    },

    B8: {
        text: "罠を解除すると、壁が開き宝珠が姿を現した。",
        image: "ruins.png",
        choices: { B81: "宝珠を取る" },
        next: { B81: "endC" }
    },

    endB: {
        text: "激しい戦いの末、あなたは守護者を倒し宝珠を手に入れた。\n=== エンディングB：力の勝利 ===",
        image: "guardian.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    endC: {
        text: "あなたは知恵で迷宮を突破し、宝珠を手に入れた。\n=== エンディングC：知恵の勝利 ===",
        image: "ruins.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    endBadB: {
        text: "罠を突破できず、あなたは迷宮に倒れた。\n=== バッドエンドB ===",
        image: "trap.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    /* ===== Cルート ===== */
    C1: {
        text: "霧の奥から不思議な歌声が聞こえる。青でも黒でもない、第三の道が現れていた。",
        image: "mystic_path.png",
        choices: {
            C11: "歌声の方へ進む",
            C12: "怖いので戻る"
        },
        next: { C11: "C2", C12: "start" }
    },

    C2: {
        text: "歌声の主は、森に封じられた古代の精霊だった。「助けを求めているのか？」",
        image: "spirit.png",
        choices: {
            C21: "助ける",
            C22: "戦う"
        },
        next: { C21: "C3", C22: "C4" }
    },

    C3: {
        text: "あなたは精霊を解放した。森は静かに光り、宝珠の真の力が目覚める。\n=== エンディングC：精霊解放ルート ===",
        image: "forest_light.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    },

    C4: {
        text: "精霊は怒り狂い、森全体が敵となった。\n=== バッドエンドC ===",
        image: "forest_dark.png",
        choices: { restart: "最初からやり直す" },
        next: { restart: "start" }
    }
};

// ===============================
// タイトル → ゲーム開始
// ===============================
document.getElementById("startButton").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    const gameBox = document.getElementById("game");
    gameBox.style.display = "block";
    setTimeout(() => gameBox.style.opacity = 1, 50);
    render("start");
};

// ===============================
// タイプライター演出（高速）
// ===============================
function typeWriter(text, element, callback) {
    let i = 0;
    element.textContent = "";
    let speed = 20; // 高速

    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
        } else {
            callback();
        }
    }

    // クリックで全文表示
    element.onclick = () => {
        element.textContent = text;
        callback();
    };

    type();
}

// ===============================
// シーン描画
// ===============================
function render(sceneName) {
    const scene = scenes[sceneName];

    const gameBox = document.getElementById("game");
    const textArea = document.getElementById("textArea");
    const choicesArea = document.getElementById("choicesArea");
    const img = document.getElementById("sceneImage");

    // フェードアウト → フェードイン
    gameBox.style.opacity = 0;
    setTimeout(() => {
        gameBox.style.opacity = 1;
    }, 200);

    // 画像ふわっと
    if (scene.image) {
        img.src = scene.image;
        img.style.display = "block";
        img.style.opacity = 0;
        img.style.transform = "translateY(10px)";
        setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "translateY(0)";
        }, 200);
    } else {
        img.style.display = "none";
    }

    // 選択肢を一旦消す
    choicesArea.innerHTML = "";

    // タイプライター開始
    typeWriter(scene.text, textArea, () => {
        // タイプ終了後に選択肢をふわっと表示
        for (const key in scene.choices) {
            const btn = document.createElement("div");
            btn.className = "choice";
            btn.textContent = scene.choices[key];
            btn.onclick = () => render(scene.next[key]);
            choicesArea.appendChild(btn);

            // ふわっと
            setTimeout(() => {
                btn.style.opacity = 1;
                btn.style.transform = "translateY(0)";
            }, 50);
        }
    });
}
</script>

</body>
</html>
