<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>霧の森と失われた宝珠</title>

<style>
    body {
        font-family: "Yu Gothic", sans-serif;
        background: #222;
        color: #eee;
        padding: 0;
        margin: 0;
        animation: bgPulse 6s ease-in-out infinite;
    }

    /* 背景が淡く光るパルス */
    @keyframes bgPulse {
        0% { background-color: #222; }
        50% { background-color: #2a2a2a; }
        100% { background-color: #222; }
    }

    /* タイトル画面 */
    #titleScreen {
        text-align: center;
        background: url('title.png');
        background-size: cover;
        background-position: center;
        height: 100vh;
        padding-top: 200px;
        color: white;
        text-shadow: 0 0 10px black;
        animation: fadeIn 1.5s ease;
    }
    #startButton {
        font-size: 28px;
        padding: 15px 40px;
        background: rgba(0,0,0,0.6);
        border-radius: 10px;
        cursor: pointer;
        display: inline-block;
        margin-top: 40px;
    }
    #startButton:hover {
        background: rgba(255,255,255,0.3);
    }

    /* ゲーム画面 */
    #game {
        width: 100%;
        max-width: 650px;
        margin: auto;
        background: #333;
        padding: 20px;
        border-radius: 10px;
        display: none;
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    /* 画像ふわっと */
    #sceneImage {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
        display: none;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 1s ease, transform 1s ease;
    }

    /* 選択肢 */
    .choice {
        background: #555;
        padding: 16px;
        margin: 10px 0;
        border-radius: 5px;
        cursor: pointer;
        font-size: 20px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .choice:hover {
        background: #777;
    }

    /* フェードイン */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* スマホ最適化 */
    @media (max-width: 600px) {
        body {
            font-size: 16px;
            line-height: 1.8;
        }
        #titleScreen {
            padding-top: 120px;
        }
        #startButton {
            font-size: 20px;
            padding: 12px 30px;
        }
        #game {
            width: 90%;
            padding: 15px;
        }
        .choice {
            font-size: 18px;
            padding: 14px;
        }
    }
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="titleScreen">
    <h1>霧の森と失われた宝珠</h1>
    <div id="startButton">ゲームスタート</div>
</div>

<!-- ゲーム画面 -->
<div id="game">
    <img id="sceneImage">
    <div id="textArea"></div>
    <div id="choicesArea"></div>
</div>

<script>
// ===============================
// シーンデータ（そのまま）
// ===============================
const scenes = { /* ここはあなたの元のシーンデータをそのまま使用 */ };
// ↑ 長すぎるので省略。あなたの貼ってくれた内容をそのまま入れてください。

// ===============================
// タイトル → ゲーム開始
// ===============================
document.getElementById("startButton").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    const gameBox = document.getElementById("game");
    gameBox.style.display = "block";
    setTimeout(() => gameBox.style.opacity = 1, 50);
    render("start");
};

// ===============================
// タイプライター演出（高速）
// ===============================
function typeWriter(text, element, callback) {
    let i = 0;
    element.textContent = "";
    let speed = 20; // ← 高速設定

    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
        } else {
            callback();
        }
    }

    // クリックで全文表示
    element.onclick = () => {
        element.textContent = text;
        callback();
    };

    type();
}

// ===============================
// シーン描画
// ===============================
function render(sceneName) {
    const scene = scenes[sceneName];

    const gameBox = document.getElementById("game");
    const textArea = document.getElementById("textArea");
    const choicesArea = document.getElementById("choicesArea");
    const img = document.getElementById("sceneImage");

    // フェードアウト → フェードイン
    gameBox.style.opacity = 0;
    setTimeout(() => {
        gameBox.style.opacity = 1;
    }, 200);

    // 画像ふわっと
    if (scene.image) {
        img.src = scene.image;
        img.style.display = "block";
        img.style.opacity = 0;
        img.style.transform = "translateY(10px)";
        setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "translateY(0)";
        }, 200);
    } else {
        img.style.display = "none";
    }

    // 選択肢を一旦消す
    choicesArea.innerHTML = "";

    // タイプライター開始
    typeWriter(scene.text, textArea, () => {
        // タイプ終了後に選択肢をふわっと表示
        for (const key in scene.choices) {
            const btn = document.createElement("div");
            btn.className = "choice";
            btn.textContent = scene.choices[key];
            btn.onclick = () => render(scene.next[key]);
            choicesArea.appendChild(btn);

            // ふわっと
            setTimeout(() => {
                btn.style.opacity = 1;
                btn.style.transform = "translateY(0)";
            }, 50);
        }
    });
}
</script>

</body>
</html>
