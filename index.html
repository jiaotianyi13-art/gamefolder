<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>霧の森と失われた宝珠</title>

<style>
    body {
        font-family: "Yu Gothic", sans-serif;
        background: #222;
        color: #eee;
        margin: 0;
        animation: bgPulse 6s ease-in-out infinite;
    }

    @keyframes bgPulse {
        0% { background-color: #222; }
        50% { background-color: #2a2a2a; }
        100% { background-color: #222; }
    }

    #titleScreen {
    background: url('title.png');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    position: relative; /* ← これが重要 */
}

#startButton {
    position: absolute;
    top: 40%;  /* ← ボタンの縦位置。ここを調整すればOK */
    left: 50%;
    transform: translateX(-50%);
    display: block;
    width: fit-content;
}

    #game {
        width: 100%;
        max-width: 650px;
        margin: auto;
        background: #333;
        padding: 20px;
        border-radius: 10px;
        display: none;
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    #sceneImage {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
        display: none;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 1s ease, transform 1s ease;
    }

    .choice {
        background: #555;
        padding: 16px;
        margin: 10px 0;
        border-radius: 5px;
        cursor: pointer;
        font-size: 20px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
</head>

<body>

<div id="titleScreen">
    <div id="startButton">ゲームスタート</div>
</div>

<div id="game">
    <img id="sceneImage">
    <div id="textArea"></div>
    <div id="choicesArea"></div>
</div>

<script>
const scenes = {
    start: {
        text: "あなたは霧の森に足を踏み入れた。王国からの任務は《蒼光の宝珠》の回収だ。\n森の入口には三つの道がある。",
        image: "forest.jpg",
        choices: {
            start_choice1: "光るキノコが並ぶ“青い道”へ進む",
            start_choice2: "古い石碑が立つ“黒い道”へ進む",
            start_choice3: "どこからか歌声が聞こえる“第三の道”へ進む"
        },
        next: { start_choice1: "A1", start_choice2: "B1", start_choice3: "C1" }
    },

    /* ===== Aルート ===== */
    A1: {
        text: "青い光の中、妖精が現れた。「心の強さを示しなさい」",
        image: "fairy.png",
        choices: {
            A1_choice1: "正直に目的を話す",
            A1_choice2: "妖精についていく"
        },
        next: { A1_choice1: "A2", A1_choice2: "A3" }
    },

    A2: {
        text: "妖精はあなたの誠実さを認めた。「ならば、森の奥へ進む資格がある」",
        image: "fairy.png",
        choices: {
            A2_choice1: "森の奥へ進む",
            A2_choice2: "妖精に質問する"
        },
        next: { A2_choice1: "A3", A2_choice2: "A2Q" }
    },

    A2Q: {
        text: "「宝珠は王国を守るための鍵。だが、使い方を誤れば災いを呼ぶ」",
        image: "fairy.png",
        choices: { A2Q_choice1: "森の奥へ進む" },
        next: { A2Q_choice1: "A3" }
    },

    A3: {
        text: "妖精はあなたを森の奥へ案内した。そこには古代の祭壇があり、青い光が脈動している。",
        image: "fairy_forest.png",
        choices: {
            A3_choice1: "祭壇に触れる",
            A3_choice2: "周囲を調べる"
        },
        next: { A3_choice1: "A4", A3_choice2: "A5" }
    },

    A4: {
        text: "祭壇に触れた瞬間、あなたの頭に古代の記憶が流れ込む。宝珠は“封印”のための道具だった。",
        image: "altar.png",
        choices: {
            A4_choice1: "記憶を受け入れる",
            A4_choice2: "拒絶する"
        },
        next: { A4_choice1: "A6", A4_choice2: "endBadA" }
    },

    A5: {
        text: "周囲には古代文字が刻まれていた。「宝珠は王国の未来を左右する」",
        image: "altar.png",
        choices: {
            A5_choice1: "祭壇に触れる",
            A5_choice2: "妖精に相談する"
        },
        next: { A5_choice1: "A4", A5_choice2: "A2Q" }
    },

    A6: {
        text: "あなたは宝珠の真実を理解した。妖精は微笑む。「あなたなら託せる」\n宝珠が光り、あなたの手に収まった。",
        image: "forest.jpg",
        choices: { A6_choice1: "最初からやり直す" },
        next: { A6_choice1: "start" }
    },

    endBadA: {
        text: "記憶を拒絶した瞬間、森の魔力が暴走した。あなたは霧に飲まれてしまった。\n=== バッドエンドA ===",
        image: "forest.jpg",
        choices: { endBadA_choice1: "最初からやり直す" },
        next: { endBadA_choice1: "start" }
    },

    /* ===== Bルート ===== */
    B1: {
        text: "石碑が光り、古代の守護者が姿を現す。「我を倒すか、知恵を示せ」",
        image: "guardian.png",
        choices: {
            B1_choice1: "戦う",
            B1_choice2: "知恵で挑む"
        },
        next: { B1_choice1: "B2", B1_choice2: "B3" }
    },

    B2: {
        text: "守護者は剣を構えた。あなたは必死に応戦するが、力では敵わない。",
        image: "guardian.png",
        choices: {
            B2_choice1: "逃げる",
            B2_choice2: "隙を突く"
        },
        next: { B2_choice1: "B4", B2_choice2: "B5" }
    },

    B3: {
        text: "石碑の裏には地下へ続く階段があった。あなたは暗い迷宮へ足を踏み入れる。",
        image: "ruins.png",
        choices: {
            B3_choice1: "左の通路へ進む",
            B3_choice2: "右の通路へ進む"
        },
        next: { B3_choice1: "B6", B3_choice2: "B7" }
    },

    B4: {
        text: "あなたは必死に逃げたが、守護者は追ってこなかった。「弱き者よ、去るがよい」",
        image: "guardian.png",
        choices: { B4_choice1: "最初からやり直す" },
        next: { B4_choice1: "start" }
    },

    B5: {
        text: "あなたは守護者の胸の青い核を狙った。見事に命中し、守護者は崩れ落ちた。",
        image: "guardian.png",
        choices: { B5_choice1: "宝珠を探す" },
        next: { B5_choice1: "endB" }
    },

    B6: {
        text: "左の通路は罠だらけだった。床が沈み、矢が飛んでくる！",
        image: "trap.png",
        choices: {
            B6_choice1: "走り抜ける",
            B6_choice2: "罠を解除する"
        },
        next: { B6_choice1: "endBadB", B6_choice2: "B8" }
    },

    B7: {
        text: "右の通路は静かだった。奥には宝珠を祀る部屋があった。",
        image: "ruins.png",
        choices: { B7_choice1: "宝珠を取る" },
        next: { B7_choice1: "endC" }
    },

    B8: {
        text: "罠を解除すると、壁が開き宝珠が姿を現した。",
        image: "ruins.png",
        choices: { B8_choice1: "宝珠を取る" },
        next: { B8_choice1: "endC" }
    },

    endB: {
        text: "激しい戦いの末、あなたは守護者を倒し宝珠を手に入れた。\n=== エンディングB：力の勝利 ===",
        image: "guardian.png",
        choices: { endB_choice1: "最初からやり直す" },
        next: { endB_choice1: "start" }
    },

    endC: {
        text: "あなたは知恵で迷宮を突破し、宝珠を手に入れた。\n=== エンディングC：知恵の勝利 ===",
        image: "ruins.png",
        choices: { endC_choice1: "最初からやり直す" },
        next: { endC_choice1: "start" }
    },

    endBadB: {
        text: "罠を突破できず、あなたは迷宮に倒れた。\n=== バッドエンドB ===",
        image: "trap.png",
        choices: { endBadB_choice1: "最初からやり直す" },
        next: { endBadB_choice1: "start" }
    },

    /* ===== Cルート ===== */
    C1: {
        text: "霧の奥から不思議な歌声が聞こえる。青でも黒でもない、第三の道が現れていた。",
        image: "mystic_path.png",
        choices: {
            C1_choice1: "歌声の方へ進む",
            C1_choice2: "怖いので戻る"
        },
        next: { C1_choice1: "C2", C1_choice2: "start" }
    },

    C2: {
        text: "歌声の主は、森に封じられた古代の精霊だった。「助けを求めているのか？」",
        image: "spirit.png",
        choices: {
            C2_choice1: "助ける",
            C2_choice2: "戦う"
        },
        next: { C2_choice1: "C3", C2_choice2: "C4" }
    },

    C3: {
        text: "あなたは精霊を解放した。森は静かに光り、宝珠の真の力が目覚める。\n=== エンディングC：精霊解放ルート ===",
        image: "forest_light.png",
        choices: { C3_choice1: "最初からやり直す" },
        next: { C3_choice1: "start" }
    },

    C4: {
        text: "精霊は怒り狂い、森全体が敵となった。\n=== バッドエンドC ===",
        image: "forest_dark.png",
        choices: { C4_choice1: "最初からやり直す" },
        next: { C4_choice1: "start" }
    }
};

document.getElementById("startButton").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    const gameBox = document.getElementById("game");
    gameBox.style.display = "block";
    setTimeout(() => gameBox.style.opacity = 1, 50);
    render("start");
};

function typeWriter(text, element, callback) {
    let i = 0;
    element.textContent = "";
    let speed = 20;

    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
        } else {
            callback();
        }
    }

    element.onclick = () => {
        element.textContent = text;
        callback();
    };

    type();
}

function render(sceneName) {
    const scene = scenes[sceneName];

    const gameBox = document.getElementById("game");
    const textArea = document.getElementById("textArea");
    const choicesArea = document.getElementById("choicesArea");
    const img = document.getElementById("sceneImage");

    gameBox.style.opacity = 0;
    setTimeout(() => {
        gameBox.style.opacity = 1;
    }, 200);

    if (scene.image) {
        img.src = scene.image;
        img.style.display = "block";
        img.style.opacity = 0;
        img.style.transform = "translateY(10px)";
        setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "translateY(0)";
        }, 200);
    } else {
        img.style.display = "none";
    }

    choicesArea.innerHTML = "";

    typeWriter(scene.text, textArea, () => {
        for (const key in scene.choices) {
            const btn = document.createElement("div");
            btn.className = "choice";
            btn.textContent = scene.choices[key];
            btn.onclick = () => render(scene.next[key]);
            choicesArea.appendChild(btn);

            setTimeout(() => {
                btn.style.opacity = 1;
                btn.style.transform = "translateY(0)";
            }, 50);
        }
    });
}
</script>

</body>
</html>
